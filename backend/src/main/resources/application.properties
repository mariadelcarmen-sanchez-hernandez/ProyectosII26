# Conexión a MySQL (usa el puerto 3307 que tienes en tu docker-compose)
spring.datasource.url=jdbc:mysql://localhost:3307/generaction?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=app
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor
server.port=8080

# Para que el frontend (React/HTML) pueda llamar a la API sin errores CORS
spring.web.cors.allowed-origins=*
```

> **¿Qué hace `ddl-auto=update`?** Le dice a Hibernate que cree/actualice las tablas automáticamente en MySQL a partir de tus entidades Java. Muy útil en desarrollo.

