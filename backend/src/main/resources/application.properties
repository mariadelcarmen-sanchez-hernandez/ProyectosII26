# Conexion a MySQL (docker en puerto 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/generaction?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=app
spring.datasource.password=apppass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor
server.port=8080

# Credenciales del administrador
app.admin.email=admin@generaction.com
app.admin.password=admin123
app.admin.nombre=Administrador