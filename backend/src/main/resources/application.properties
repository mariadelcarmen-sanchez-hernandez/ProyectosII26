## Paso 3 — Estructura de carpetas

Dentro de `src/main/java/com/generaction/backend/` crea esta estructura:
```
backend/
├── entity/          ← Las clases Java que representan las tablas
├── repository/      ← Interfaces para acceder a la BD
├── service/         ← Lógica de negocio
├── controller/      ← Endpoints REST (lo que llama el frontend)
└── dto/             ← Objetos de transferencia (lo que entra/sale por JSON)