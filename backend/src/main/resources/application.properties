# Conexion a MySQL (se configura via variables de entorno en produccion)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3307/generaction?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:app}
spring.datasource.password=${DATABASE_PASSWORD:apppass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# Puerto del servidor (Render inyecta PORT automaticamente)
server.port=${PORT:10000}

# Credenciales del administrador
app.admin.email=${ADMIN_EMAIL:admin@generaction.com}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.nombre=${ADMIN_NOMBRE:Administrador}