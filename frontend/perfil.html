<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Voluntariado</title>
    <link rel="stylesheet" href="perfil_style.css">
</head>
<body>

    <nav class="navbar">
        <a href="paginainiciovoluntario.html" class="back-btn">← Volver</a>
        <div class="nav-title">Mi Perfil</div>
    </nav>

    <main class="container">
        <section class="profile-card" id="profileView">
            <div class="profile-header">
                <div class="avatar-circle">
                    <img src="https://via.placeholder.com/150" alt="Foto de perfil" id="displayPhoto">
                </div>
                <h1 id="displayName">Juan Pérez</h1>
                <p id="displayEmail">juan.perez@email.com</p>
                
                <button class="main-edit-btn" onclick="toggleEdit()">Editar mi Perfil</button>
            </div>

            <div class="tasks-container">
                <div class="tasks-column">
                    <h3>📋 Tareas En Curso</h3>
                    <div class="task-list">
                        <div class="task-box pending">
                            <span class="dot"></span>
                            <p>Acompañamiento a pie - Sra. María (Lunes 10:00)</p>
                        </div>
                        <div class="task-box pending">
                            <span class="dot"></span>
                            <p>Compra semanal - Sr. Ricardo (Miércoles 17:00)</p>
                        </div>
                    </div>
                </div>

                <div class="tasks-column">
                    <h3>✅ Tareas Finalizadas</h3>
                    <div class="task-list">
                        <div class="task-box completed">
                            <span class="check">✔</span>
                            <p>Paseo matutino - Sr. Luis (Viernes Pasado)</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="edit-card" id="editForm" style="display: none;">
            <h2>Editar Información</h2>
            <form id="updateForm">
                <div class="input-group">
                    <label>Foto de Perfil</label>
                    <input type="file" accept="image/*">
                </div>

                <div class="input-grid">
                    <div class="input-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="editName" value="Juan Pérez">
                    </div>
                    <div class="input-group">
                        <label>Teléfono</label>
                        <input type="tel" id="editPhone" value="600123456">
                    </div>
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="editEmail" value="juan.perez@email.com">
                </div>

                <div class="input-group certificate-box">
                    <label>Subir Certificados (PDF/JPG)</label>
                    <input type="file" multiple>
                </div>

                <div class="button-group">
                    <button type="button" class="cancel-btn" onclick="toggleEdit()">Cancelar</button>
                    <button type="submit" class="save-btn">Guardar Cambios</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        function toggleEdit() {
            const view = document.getElementById('profileView');
            const form = document.getElementById('editForm');
            if (view.style.display === 'none') {
                view.style.display = 'block';
                form.style.display = 'none';
            } else {
                view.style.display = 'none';
                form.style.display = 'block';
            }
        }
    </script>
</body>
</html>
