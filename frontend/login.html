<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Voluntariado</title>
    <link rel="stylesheet" href="login_css.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="back-btn">
            <span class="icon">←</span> Volver
        </a>
        <div class="nav-title">Acceso al Sistema</div>
    </nav>

    <main class="login-container">
        <div class="login-card">
            <div class="icon-header">
                <div class="icon-circle">🔐</div>
            </div>
            
            <h2>¡Bienvenido de nuevo!</h2>
            <p class="subtitle">Introduce tus datos para acceder</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="forgot-password">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="login-btn">Entrar</button>
            </form>

            <div class="register-footer">
                ¿No tienes cuenta? <a href="registro_pasos.html">Regístrate aquí</a>
            </div>
        </div>
    </main>

</body>
</html>
